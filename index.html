<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smriti — Your Second Brain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 640px;
            width: 100%;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        h1 { font-size: 28px; font-weight: 600; color: #fff; }
        h1 span { color: #a78bfa; }

        .subtitle { font-size: 14px; color: #888; margin-top: -20px; }

        .mic-btn {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid #333;
            background: #1a1a2e;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            position: relative;
        }
        .mic-btn:hover { border-color: #a78bfa; background: #1e1e3a; }
        .mic-btn.active {
            border-color: #a78bfa; background: #1e1e3a;
            box-shadow: 0 0 40px rgba(167, 139, 250, 0.35);
        }
        .mic-btn.active .pulse {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid #a78bfa;
            animation: pulse 2s ease-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .mic-icon { width: 36px; height: 36px; fill: #888; transition: fill 0.3s ease; }
        .mic-btn.active .mic-icon { fill: #a78bfa; }
        .mic-label { font-size: 14px; color: #666; }

        .status { font-size: 13px; color: #555; min-height: 20px; text-align: center; }
        .status.connected { color: #4ade80; }
        .status.error { color: #f87171; }

        .token-meter {
            font-size: 12px;
            color: #666;
            text-align: center;
            min-height: 16px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.3px;
        }
        .token-meter .count { color: #c4b5fd; font-weight: 500; }
        .token-meter .sep { color: #333; margin: 0 6px; }
        .token-meter.warn .count { color: #fbbf24; }
        .token-meter.over .count { color: #f87171; }

        .tool-indicator {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            color: #c4b5fd;
            width: 100%;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .tool-indicator.visible { display: flex; }
        .tool-spinner {
            width: 14px; height: 14px;
            border: 2px solid #333;
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .transcript {
            width: 100%;
            background: #111118;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .transcript-entry { font-size: 14px; line-height: 1.5; padding: 8px 12px; border-radius: 8px; }
        .transcript-entry.user { background: #1e1e3a; color: #c4b5fd; align-self: flex-end; max-width: 85%; }
        .transcript-entry.agent { background: #1a2332; color: #93c5fd; align-self: flex-start; max-width: 85%; }
        .transcript-label {
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 2px; opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>Smriti</span> — Your Second Brain</h1>
        <p class="subtitle">Voice-driven memory · Gemini Live</p>

        <button class="mic-btn" id="micBtn" onclick="toggleMic()">
            <div class="pulse" style="display:none"></div>
            <svg class="mic-icon" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>
        <p class="mic-label" id="micLabel">Click to start</p>

        <p class="status" id="status"></p>
        <p class="token-meter" id="tokenMeter"></p>

        <div class="tool-indicator" id="toolIndicator">
            <div class="tool-spinner"></div>
            <span id="toolName">Working...</span>
        </div>

        <div class="transcript" id="transcript"></div>
    </div>

    <script>
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let workletNode = null;
        let isActive = false;

        let playbackQueue = [];
        let isPlaying = false;

        const micBtn = document.getElementById('micBtn');
        const micLabel = document.getElementById('micLabel');
        const statusEl = document.getElementById('status');
        const tokenMeter = document.getElementById('tokenMeter');
        const toolIndicator = document.getElementById('toolIndicator');
        const toolName = document.getElementById('toolName');
        const transcript = document.getElementById('transcript');

        function formatTokens(n) {
            if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 1 : 2) + 'k';
            return String(n);
        }

        function updateTokenMeter(current, threshold) {
            if (current == null) { tokenMeter.textContent = ''; return; }
            const pct = threshold ? Math.min(100, Math.round((current / threshold) * 100)) : null;
            tokenMeter.classList.remove('warn', 'over');
            if (threshold) {
                if (current >= threshold) tokenMeter.classList.add('over');
                else if (current >= threshold * 0.9) tokenMeter.classList.add('warn');
            }
            const parts = [
                `<span class="count">${formatTokens(current)}</span> tokens`,
            ];
            if (threshold) {
                parts.push(`<span class="sep">·</span>`);
                parts.push(`${formatTokens(threshold)} budget (${pct}%)`);
            }
            tokenMeter.innerHTML = parts.join('');
        }

        let currentUserText = '';
        let currentAgentText = '';
        let currentUserEl = null;
        let currentAgentEl = null;

        function setStatus(text, type = '') {
            statusEl.textContent = text;
            statusEl.className = 'status ' + type;
        }

        function showTool(action) {
            const labels = {
                read_identity: 'Reading identity…',
                write_identity: 'Updating identity…',
                read_node: 'Reading node…',
                create_node: 'Creating node…',
                update_node: 'Updating node…',
                edit_node: 'Editing node…',
                list_nodes: 'Listing nodes…',
                extract_links: 'Extracting links…',
                delete_node: 'Deleting node…',
            };
            toolName.textContent = labels[action] || (action || 'Working...');
            toolIndicator.classList.add('visible');
        }

        function hideTool() { toolIndicator.classList.remove('visible'); }

        function addTranscript(role, text) {
            if (role === 'user') {
                currentUserText += text;
                if (!currentUserEl) {
                    currentUserEl = document.createElement('div');
                    currentUserEl.className = 'transcript-entry user';
                    currentUserEl.innerHTML = '<div class="transcript-label">You</div><div class="transcript-text"></div>';
                    transcript.appendChild(currentUserEl);
                }
                currentUserEl.querySelector('.transcript-text').textContent = currentUserText;
            } else {
                currentAgentText += text;
                if (!currentAgentEl) {
                    currentAgentEl = document.createElement('div');
                    currentAgentEl.className = 'transcript-entry agent';
                    currentAgentEl.innerHTML = '<div class="transcript-label">Smriti</div><div class="transcript-text"></div>';
                    transcript.appendChild(currentAgentEl);
                }
                currentAgentEl.querySelector('.transcript-text').textContent = currentAgentText;
            }
            transcript.scrollTop = transcript.scrollHeight;
        }

        function finishTurn() {
            currentUserText = '';
            currentAgentText = '';
            currentUserEl = null;
            currentAgentEl = null;
        }

        function playAudioChunk(base64Data) {
            playbackQueue.push(base64Data);
            if (!isPlaying) processPlaybackQueue();
        }

        async function processPlaybackQueue() {
            if (playbackQueue.length === 0) { isPlaying = false; return; }
            isPlaying = true;

            const base64Data = playbackQueue.shift();
            const binaryStr = atob(base64Data);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            const samples = new Int16Array(bytes.buffer);
            const floatSamples = new Float32Array(samples.length);
            for (let i = 0; i < samples.length; i++) floatSamples[i] = samples[i] / 32768.0;

            const sampleRate = 24000;
            const audioBuffer = audioContext.createBuffer(1, floatSamples.length, sampleRate);
            audioBuffer.getChannelData(0).set(floatSamples);

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);
            source.onended = () => processPlaybackQueue();
            source.start();
        }

        function clearPlayback() { playbackQueue = []; isPlaying = false; }

        async function toggleMic() {
            if (isActive) stopSession();
            else await startSession();
        }

        async function startSession() {
            try {
                audioContext = new AudioContext({ sampleRate: 16000 });

                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });

                await audioContext.audioWorklet.addModule('data:text/javascript,' + encodeURIComponent(`
                    class PcmProcessor extends AudioWorkletProcessor {
                        process(inputs) {
                            const input = inputs[0];
                            if (input.length > 0) {
                                const samples = input[0];
                                const pcm16 = new Int16Array(samples.length);
                                for (let i = 0; i < samples.length; i++) {
                                    const s = Math.max(-1, Math.min(1, samples[i]));
                                    pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                                }
                                this.port.postMessage(pcm16.buffer, [pcm16.buffer]);
                            }
                            return true;
                        }
                    }
                    registerProcessor('pcm-processor', PcmProcessor);
                `));

                const source = audioContext.createMediaStreamSource(mediaStream);
                workletNode = new AudioWorkletNode(audioContext, 'pcm-processor');

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

                ws.onopen = () => {
                    setStatus('Connected', 'connected');
                    micBtn.classList.add('active');
                    micBtn.querySelector('.pulse').style.display = 'block';
                    micLabel.textContent = 'Listening... click to stop';
                    isActive = true;

                    workletNode.port.onmessage = (event) => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            const pcmData = new Uint8Array(event.data);
                            const base64 = btoa(String.fromCharCode(...pcmData));
                            ws.send(JSON.stringify({ type: 'audio', data: base64 }));
                        }
                    };
                    source.connect(workletNode);
                    workletNode.connect(audioContext.destination);
                };

                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    switch (msg.type) {
                        case 'audio': playAudioChunk(msg.data); break;
                        case 'input_transcript': addTranscript('user', msg.text); break;
                        case 'output_transcript': addTranscript('agent', msg.text); break;
                        case 'tool_call': showTool(msg.action || msg.name); break;
                        case 'tool_result': hideTool(); break;
                        case 'turn_complete': finishTurn(); break;
                        case 'interrupted': clearPlayback(); finishTurn(); break;
                        case 'status': setStatus(msg.message, 'connected'); break;
                        case 'error': setStatus('Error: ' + msg.message, 'error'); break;
                        case 'token_usage': updateTokenMeter(msg.current, msg.threshold); break;
                        case 'threshold_reached': updateTokenMeter(msg.current, msg.threshold); break;
                    }
                };

                ws.onclose = () => { setStatus('Disconnected'); stopSession(); };
                ws.onerror = () => { setStatus('Connection error', 'error'); };

            } catch (err) {
                setStatus('Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        function stopSession() {
            isActive = false;
            micBtn.classList.remove('active');
            micBtn.querySelector('.pulse').style.display = 'none';
            micLabel.textContent = 'Click to start';

            if (ws) { ws.close(); ws = null; }
            if (workletNode) { workletNode.disconnect(); workletNode = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }

            clearPlayback();
            hideTool();
            tokenMeter.textContent = '';
            tokenMeter.classList.remove('warn', 'over');
        }
    </script>
</body>
</html>
